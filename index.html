            "@type": "Question",
            "name": "How much does a website cost?",

              "@type": "Answer",
              "text": "Packages start at 150 KM for a Starter single-page site, 350 KM for a Business multi-page site, and 600 KM for a full Premium website. Every project gets a written quote before anything starts."
            }
          },
          {
            "@type": "Question",
            "name": "How long does it take to build a website?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The Starter package is delivered in 5 days, Business in 7 days, and Premium in 14 days. Timelines are fixed in writing before the project starts."
            }
          },

            "@type": "Question",
            "name": "Do I own the code after the project?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Once the project is paid in full, all code, assets, and access credentials are transferred to you. You own everything outright."
            }
          },
          {
            "@type": "Question",
            "name": "Can you work with clients outside Bosnia?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, all projects are done remotely. I work with clients worldwide. Communication is handled via email, Slack, or WhatsApp — whatever works for you."
            }
          },
          {
            "@type": "Question",
            "name": "What technologies do you use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "I primarily build with React, Next.js, Node.js, TypeScript, and Supabase/PostgreSQL. For styling I use Tailwind CSS or plain CSS. Stack is always chosen to fit the project, not the other way around."
            }
          },
          {
            "@type": "Question",
            "name": "How do we communicate during the project?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Email, Slack, WhatsApp — whatever works for you. I send progress updates proactively, share preview links early, and respond to messages quickly. You always know the status."
            }
          }
